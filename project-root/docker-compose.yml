services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: techtrends
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d techtrends"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - RAW_S3_ENDPOINT_URL=http://minio:9000
      - RAW_S3_ACCESS_KEY_ID=minioadmin
      - RAW_S3_SECRET_ACCESS_KEY=minioadmin
      - RAW_S3_BUCKET=techtrends-raw
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/techtrends
      - ENABLE_DB_PERSISTENCE=true
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_started

  kafka-setup:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-c"]
    command: >
      'for i in $(seq 1 30); do
         kafka-topics --bootstrap-server kafka:29092 --create --topic google_trends --partitions 1 --replication-factor 1 && \
         kafka-topics --bootstrap-server kafka:29092 --create --topic stackoverflow --partitions 1 --replication-factor 1 && \
         kafka-topics --bootstrap-server kafka:29092 --create --topic github_events --partitions 1 --replication-factor 1 && \
         kafka-topics --bootstrap-server kafka:29092 --create --topic tech_blogs --partitions 1 --replication-factor 1 && exit 0 || sleep 2;
       done; exit 1'
    restart: 'no'

volumes:
  postgres_data:
  minio_data:
